feeds:
  # ── Broadcast / Wire ──────────────────────────────────────
  - name: CNN Top Stories
    url: https://rss.cnn.com/rss/edition.rss
    lean: center-left
  - name: MSNBC Top Stories
    url: https://www.msnbc.com/feeds/rss.xml
    lean: left
  - name: FOX News Latest
    url: https://moxie.foxnews.com/google-publisher/latest.xml
    lean: right
  - name: ABC News
    url: https://abcnews.go.com/abcnews/topstories
    lean: center
  - name: CBS News
    url: https://www.cbsnews.com/latest/rss/main
    lean: center
  - name: PBS NewsHour
    url: https://www.pbs.org/newshour/feeds/rss/headlines
    lean: center-left
  - name: NPR News
    url: https://feeds.npr.org/1001/rss.xml
    lean: center-left
  - name: AP News
    url: https://feedx.net/rss/ap.xml
    lean: center

  # ── Major papers ────────────────────────────────────────
  - name: NY Times
    url: https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml
    lean: center-left
  - name: Washington Post
    url: https://feeds.washingtonpost.com/rss/national
    lean: center-left
  - name: NY Post
    url: https://nypost.com/feed/
    lean: center-right

  # ── Center / Political ──────────────────────────────────
  - name: The Hill
    url: https://thehill.com/feed/
    lean: center
  - name: RealClearPolitics
    url: https://www.realclearpolitics.com/index.xml
    lean: center-right
  - name: CNBC Top News
    url: https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114
    lean: center

  # ── Right-leaning ───────────────────────────────────────
  - name: Breitbart
    url: https://feeds.feedburner.com/breitbart
    lean: right
  - name: Daily Wire
    url: https://www.dailywire.com/feeds/rss.xml
    lean: right
  - name: The Federalist
    url: https://thefederalist.com/feed/
    lean: right
  - name: Drudge Report
    url: https://www.drudgereport.com/rss.xml
    lean: right
  - name: Rantingly
    url: https://rantingly.com/feed
    lean: right
  - name: Patriots.win (forum)
    url: https://patriots.win/feed
    lean: right

  # ── Left-leaning ────────────────────────────────────────
  - name: The Intercept
    url: https://theintercept.com/feed/?rss
    lean: left
  - name: Democracy Now
    url: https://www.democracynow.org/democracynow.rss
    lean: left

  # ── International ───────────────────────────────────────
  - name: BBC (US & Canada)
    url: https://feeds.bbci.co.uk/news/world/us_and_canada/rss.xml
    lean: international
  - name: The Guardian US
    url: https://www.theguardian.com/us-news/rss
    lean: center-left
  - name: Al Jazeera
    url: https://www.aljazeera.com/xml/rss/all.xml
    lean: international

  # ── Aggregators ─────────────────────────────────────────
  - name: Google News (US)
    url: https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en
    lean: center

settings:
  output_dir: output
  max_items_per_feed: 250
  merge_all_sources: true
  merged_filename: daily-news-{date}.md
  daily_title: Daily RSS Digest - {date}
  write_individual_feeds: false
  summary_max_sentences: 6
  summary_max_words: 300

# Silence detection: identify stories covered by one side but not the other
silence:
  enabled: true
  # Minimum sources on one side before flagging silence on the other
  min_sources_covering: 2
  # How many days back to check for silence gaps
  lookback_days: 7

# Alerts: push notifications for disappearing stories
alerts:
  enabled: false
  # ntfy.sh topic (free push notifications — visit https://ntfy.sh)
  ntfy_topic: ""
  # Only alert for stories that reached this peak source count
  min_peak_sources: 3
  # Webhook URL (optional, receives JSON POST)
  webhook_url: ""

# Daily digest: summary notification/email
digest:
  enabled: false
  # ntfy.sh topic (can be same or different from alerts)
  ntfy_topic: ""
  # SMTP settings for email digest (all required for email delivery)
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_pass: ""
  smtp_from: ""
  smtp_to: ""
