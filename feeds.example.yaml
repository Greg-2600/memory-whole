# Example feeds.yaml for Memory Whole
#
# Each feed needs: name, url, lean
# Lean values: left | center-left | center | center-right | right | international

feeds:
  # ── Wire services ─────────────────────────────────────────
  - name: AP News
    url: https://feedx.net/rss/ap.xml
    lean: center
  - name: Reuters
    url: https://www.reutersagency.com/feed/
    lean: center

  # ── Broadcast ─────────────────────────────────────────────
  - name: CNN Top Stories
    url: https://rss.cnn.com/rss/edition.rss
    lean: center-left
  - name: FOX News Latest
    url: https://moxie.foxnews.com/google-publisher/latest.xml
    lean: right
  - name: NPR News
    url: https://feeds.npr.org/1001/rss.xml
    lean: center-left

  # ── Major papers ──────────────────────────────────────────
  - name: NY Times
    url: https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml
    lean: center-left
  - name: Wall Street Journal
    url: https://feeds.a.dj.com/rss/RSSWorldNews.xml
    lean: center-right
  - name: Washington Post
    url: https://feeds.washingtonpost.com/rss/national
    lean: center-left

  # ── Center / Political ────────────────────────────────────
  - name: Politico
    url: https://www.politico.com/rss/politicopicks.xml
    lean: center
  - name: The Hill
    url: https://thehill.com/feed/
    lean: center

  # ── Right-leaning ─────────────────────────────────────────
  - name: Breitbart
    url: https://feeds.feedburner.com/breitbart
    lean: right
  - name: National Review
    url: https://www.nationalreview.com/feed/
    lean: right

  # ── Left-leaning ──────────────────────────────────────────
  - name: HuffPost
    url: https://www.huffpost.com/section/front-page/feed
    lean: left
  - name: The Intercept
    url: https://theintercept.com/feed/?rss
    lean: left

  # ── International ─────────────────────────────────────────
  - name: BBC (US & Canada)
    url: https://feeds.bbci.co.uk/news/world/us_and_canada/rss.xml
    lean: international

settings:
  # output directory for generated markdown and artifacts
  output_dir: output

  # how many items to fetch per feed by default (can be overridden with --max-items)
  max_items_per_feed: 250

  # whether to merge all sources into a single daily digest
  merge_all_sources: true

  # filename template for merged daily digests (supports {date})
  merged_filename: daily-news-{date}.md

  # H1 title template for merged digests (supports {date})
  daily_title: Daily RSS Digest - {date}

  # write one markdown file per feed in addition to the merged digest
  write_individual_feeds: false

  # summary defaults (can be overridden via CLI)
  summary_max_sentences: 6
  summary_max_words: 300

# Silence detection: find stories covered by one side but not the other
silence:
  enabled: true
  min_sources_covering: 2     # min sources on one side before flagging silence
  lookback_days: 7

# Alerts: push notifications for disappearing stories
alerts:
  enabled: false
  ntfy_topic: ""              # free push via https://ntfy.sh (e.g., "my-memory-whole")
  min_peak_sources: 3
  webhook_url: ""             # optional generic JSON webhook

# Daily digest: summary notification/email
digest:
  enabled: false
  ntfy_topic: ""
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_pass: ""
  smtp_from: ""
  smtp_to: ""